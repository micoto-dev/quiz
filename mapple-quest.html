const bossData = {
  name: "天城のわさび",
  title: "伊豆の旅の最終問題",
  hp: 120,
  story: "天城の清流で育った本わさび。最後の一問、あなたの舌の記憶を試す。"
};

const bossQuiz = {
  q: "天城わさびの里で食べられる名物ソフトクリーム。その上にトッピングされるのは？",
  options: ["生わさび", "練りわさび", "わさびシロップ", "わさび葉"],
  correct: 0,
  commentary: "道の駅「天城越え」内の天城わさびの里では、生わさびトッピングのソフトクリームが名物。本物志向の一品で、わさび収穫体験もできます。",
  source: "まっぷる 伊豆ソフトクリーム特集"
};

function MappleQuest() {
  const [screen, setScreen] = useState('intro');
  const [checkedIn, setCheckedIn] = useState([]);
  const [currentCP, setCurrentCP] = useState(null);
  const [onsiteStep, setOnsiteStep] = useState('arrive');
  const [selectedLocation, setSelectedLocation] = useState(null); // どの場所を選んだか
  const [missionResult, setMissionResult] = useState(null); // 'correct' | 'wrong' | null
  const [selected, setSelected] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [bossHp, setBossHp] = useState(bossData.hp);
  const [playerLv, setPlayerLv] = useState(1);
  const [playerXp, setPlayerXp] = useState(0);
  const [mounted, setMounted] = useState(false);
  const [shake, setShake] = useState(false);

  useEffect(() => { setMounted(true); }, []);

  const startCheckpoint = (cp) => {
    setCurrentCP(cp);
    setSelected(null);
    setShowResult(false);
    setSelectedLocation(null);
    setMissionResult(null);
    if (cp.type === 'onsite_visit') {
      setOnsiteStep('arrive');
      setScreen('onsite_visit');
    } else {
      setScreen('quiz');
    }
  };

  const handleAnswer = (idx) => {
    if (showResult) return;
    setSelected(idx);
    setShowResult(true);
    if (idx === currentCP.quiz.correct) {
      setCheckedIn([...checkedIn, currentCP.id]);
      setBossHp(Math.max(0, bossHp - currentCP.damage));
      const newXp = playerXp + currentCP.damage;
      setPlayerXp(newXp);
      if (newXp >= 50 && playerLv === 1) setPlayerLv(2);
      if (newXp >= 90 && playerLv === 2) setPlayerLv(3);
      setShake(true);
      setTimeout(() => setShake(false), 500);
    }
  };

  // 場所選択（どこに来た？）
  const handleLocationSelect = (locId) => {
    const loc = currentCP.visitQuiz.locations.find(l => l.id === locId);
    setSelectedLocation(loc);
    setSelected(null);
    setShowResult(false);
    setOnsiteStep('mission');
  };

  // ミッション（現地看板問題）の回答
  const handleMissionAnswer = (idx) => {
    if (showResult) return;
    setSelected(idx);
    setShowResult(true);
    const correct = idx === selectedLocation.mission.correct;
    setMissionResult(correct ? 'correct' : 'wrong');
    if (correct) {
      setCheckedIn([...checkedIn, currentCP.id]);
      setBossHp(Math.max(0, bossHp - currentCP.damage));
      const newXp = playerXp + currentCP.damage;
      setPlayerXp(newXp);
      if (newXp >= 90 && playerLv === 2) setPlayerLv(3);
      setShake(true);
      setTimeout(() => setShake(false), 500);
    }
  };

  const handleBossAnswer = (idx) => {
    if (showResult) return;
    setSelected(idx);
    setShowResult(true);
    if (idx === bossQuiz.correct) {
      setBossHp(0);
      setShake(true);
      setTimeout(() => { setShake(false); setScreen('victory'); }, 1200);
    }
  };

  const allCleared = checkedIn.length === checkpoints.length;

  // ====================================================================
  // INTRO
  // ====================================================================
  if (screen === 'intro') {
    return (
      <Frame>
        <div style={{ ...introStyle, opacity: mounted ? 1 : 0, transition: 'opacity 0.8s' }}>
          <Stars />
          <div style={{ position: 'relative', textAlign: 'center', paddingTop: '32px' }}>
            <div style={{ fontSize: '10px', letterSpacing: '0.4em', color: '#c9b037', marginBottom: '12px' }}>
              MAPPLE QUEST · CHAPTER 01
            </div>
            <h1 style={{
              fontSize: '38px', margin: '0 0 6px', letterSpacing: '0.1em',
              fontWeight: '700', fontFamily: '"Hiragino Mincho ProN", serif',
              background: 'linear-gradient(180deg, #fff 0%, #c9b037 100%)',
              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
            }}>
              伊豆クエスト
            </h1>
            <div style={{ fontSize: '11px', letterSpacing: '0.3em', color: '#8899aa', marginBottom: '24px' }}>
              IZU QUEST — 中伊豆編
            </div>

            <div style={{
              display: 'flex', justifyContent: 'center', marginBottom: '12px',
              animation: 'bossFloat 3s ease-in-out infinite'
            }}>
              <Wasabi size={200} />
            </div>

            <div style={{
              background: 'rgba(10, 20, 30, 0.6)',
              border: '1px solid rgba(201, 176, 55, 0.3)',
              padding: '16px 20px', marginBottom: '24px', borderRadius: '4px'
            }}>
              <div style={{ fontSize: '10px', letterSpacing: '0.3em', color: '#c9b037', marginBottom: '4px' }}>
                FINAL CHALLENGE
              </div>
              <div style={{
                fontSize: '22px', fontWeight: '600', marginBottom: '4px',
                fontFamily: '"Hiragino Mincho ProN", serif', color: '#f0e6d2'
              }}>
                {bossData.name}
              </div>
              <div style={{ fontSize: '11px', color: '#8899aa', marginBottom: '10px' }}>
                {bossData.title}
              </div>
              <p style={{
                fontSize: '11px', lineHeight: '1.7', color: '#c4b8a0', margin: '0',
                fontStyle: 'italic', borderLeft: '2px solid #c9b037',
                paddingLeft: '10px', textAlign: 'left'
              }}>
                「{bossData.story}」
              </p>
            </div>

            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: '6px',
              padding: '6px 14px', background: 'rgba(196, 69, 54, 0.15)',
              border: '1px solid rgba(196, 69, 54, 0.4)',
              marginBottom: '20px', fontSize: '10px', letterSpacing: '0.2em',
              color: '#e0685a', borderRadius: '2px'
            }}>
              📍 NEW · 現地訪問チェック搭載
            </div>

            <button onClick={() => setScreen('map')} style={startBtnStyle}
              onMouseOver={(e) => { e.target.style.transform = 'translateY(-2px)'; e.target.style.boxShadow = '0 6px 25px rgba(201, 176, 55, 0.6)'; }}
              onMouseOut={(e) => { e.target.style.transform = 'translateY(0)'; e.target.style.boxShadow = '0 4px 20px rgba(201, 176, 55, 0.4)'; }}>
              ▶ クエスト開始
            </button>

            <div style={{ marginTop: '20px', fontSize: '10px', color: '#667788', letterSpacing: '0.15em' }}>
              LINE公式アカウント → 現地チェックインで解放
            </div>
          </div>

          <style>{`
            @keyframes bossFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
          `}</style>
        </div>
      </Frame>
    );
  }

  // ====================================================================
  // MAP
  // ====================================================================
  if (screen === 'map') {
    return (
      <Frame>
        <div style={{
          minHeight: '680px',
          background: 'linear-gradient(180deg, #1a2332 0%, #2d3e50 100%)',
          color: '#f0e6d2', padding: '20px 16px 32px',
          fontFamily: '"Hiragino Sans", sans-serif'
        }}>
          <StatusBar playerLv={playerLv} playerXp={playerXp} cleared={checkedIn.length} total={checkpoints.length} />

          <div style={{
            background: 'rgba(10, 20, 30, 0.6)',
            border: '1px solid rgba(201, 176, 55, 0.2)',
            padding: '14px', marginBottom: '20px', borderRadius: '4px'
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '8px' }}>
              <div style={{ animation: shake ? 'shake 0.5s' : 'none', flexShrink: 0 }}>
                <Wasabi size={56} damaged={bossHp === 0} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: '9px', color: '#c9b037', letterSpacing: '0.2em', marginBottom: '2px' }}>FINAL CHALLENGE</div>
                <div style={{ fontSize: '14px', fontWeight: '600', fontFamily: '"Hiragino Mincho ProN", serif' }}>{bossData.name}</div>
              </div>
              <div style={{ fontSize: '11px', color: '#8899aa' }}>
                HP <span style={{ color: '#c9b037', fontSize: '14px', fontWeight: '600' }}>{bossHp}</span>/{bossData.hp}
              </div>
            </div>
            <div style={{ height: '5px', background: 'rgba(255,255,255,0.1)', borderRadius: '3px', overflow: 'hidden' }}>
              <div style={{
                height: '100%', width: `${(bossHp / bossData.hp) * 100}%`,
                background: bossHp > 60 ? 'linear-gradient(90deg, #4a7c59, #78a67e)' :
                            bossHp > 30 ? 'linear-gradient(90deg, #c9b037, #e0c850)' :
                                          'linear-gradient(90deg, #c44536, #e0685a)',
                transition: 'all 0.6s'
              }} />
            </div>
          </div>

          <div style={{
            display: 'flex', gap: '8px', marginBottom: '14px', fontSize: '10px', color: '#8899aa'
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
              <span style={{
                padding: '2px 6px', background: 'rgba(196, 69, 54, 0.2)',
                border: '1px solid #c44536', color: '#e0685a', borderRadius: '2px',
                fontSize: '9px', letterSpacing: '0.1em', fontWeight: '600'
              }}>📍 ONSITE</span>
              <span>現地でしか解けない</span>
            </div>
          </div>

          <div style={{ fontSize: '10px', letterSpacing: '0.3em', color: '#c9b037', marginBottom: '10px' }}>
            CHECKPOINTS
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', marginBottom: '24px' }}>
            {checkpoints.map((cp, i) => {
              const isCleared = checkedIn.includes(cp.id);
              const isOnsite = cp.type === 'onsite_visit';
              return (
                <button
                  key={cp.id}
                  onClick={() => !isCleared && startCheckpoint(cp)}
                  disabled={isCleared}
                  style={{
                    background: isCleared ? 'rgba(74, 124, 89, 0.15)' :
                                isOnsite ? 'rgba(196, 69, 54, 0.08)' : 'rgba(255,255,255,0.03)',
                    border: `1px solid ${isCleared ? 'rgba(74, 124, 89, 0.4)' :
                                          isOnsite ? 'rgba(196, 69, 54, 0.35)' :
                                                     'rgba(201, 176, 55, 0.2)'}`,
                    padding: '14px', textAlign: 'left', width: '100%',
                    cursor: isCleared ? 'default' : 'pointer',
                    color: '#f0e6d2', borderRadius: '4px',
                    transition: 'all 0.3s', display: 'flex', alignItems: 'center', gap: '12px',
                    fontFamily: 'inherit', opacity: isCleared ? 0.7 : 1,
                    animation: `fadeSlide 0.4s ease ${i * 0.08}s backwards`
                  }}
                >
                  <div style={{
                    width: '44px', height: '44px', flexShrink: 0,
                    background: isCleared ? 'rgba(74, 124, 89, 0.3)' :
                                isOnsite ? 'rgba(196, 69, 54, 0.15)' :
                                           'rgba(201, 176, 55, 0.1)',
                    border: `1px solid ${isCleared ? '#78a67e' :
                                          isOnsite ? 'rgba(196, 69, 54, 0.5)' :
                                                     'rgba(201, 176, 55, 0.3)'}`,
                    borderRadius: '2px',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: '22px'
                  }}>
                    {isCleared ? '✓' : cp.icon}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '3px', flexWrap: 'wrap' }}>
                      {isOnsite && (
                        <span style={{
                          fontSize: '8px', padding: '2px 6px',
                          background: '#c44536', color: '#fff',
                          letterSpacing: '0.15em', fontWeight: '700', borderRadius: '1px'
                        }}>📍 ONSITE</span>
                      )}
                      <span style={{
                        fontSize: '8px', padding: '2px 6px',
                        background: cp.difficulty === 'EASY' ? '#4a7c59' :
                                    cp.difficulty === 'MEDIUM' ? '#c9b037' :
                                    cp.difficulty === 'ONSITE' ? '#8b2a1f' : '#8b2a1f',
                        color: cp.difficulty === 'MEDIUM' ? '#0a0e1a' : '#fff',
                        letterSpacing: '0.15em', fontWeight: '700', borderRadius: '1px'
                      }}>{cp.difficulty}</span>
                      <span style={{ fontSize: '9px', color: '#8899aa' }}>-{cp.damage} DMG</span>
                    </div>
                    <div style={{
                      fontSize: '14px', fontWeight: '500',
                      fontFamily: '"Hiragino Mincho ProN", serif',
                      color: isCleared ? '#8899aa' : '#f0e6d2',
                      textDecoration: isCleared ? 'line-through' : 'none'
                    }}>
                      {cp.name}
                    </div>
                  </div>
                  <div style={{ fontSize: '16px', color: isCleared ? '#78a67e' : isOnsite ? '#e0685a' : '#c9b037' }}>
                    {isCleared ? '' : '▶'}
                  </div>
                </button>
              );
            })}
          </div>

          <button
            onClick={() => { if (allCleared) { setSelected(null); setShowResult(false); setScreen('boss'); } }}
            disabled={!allCleared}
            style={{
              width: '100%', padding: '18px',
              background: allCleared ? 'linear-gradient(135deg, #4a7c59 0%, #2d4a30 100%)' : 'rgba(255,255,255,0.05)',
              border: `1px solid ${allCleared ? 'rgba(120, 166, 126, 0.6)' : 'rgba(255,255,255,0.1)'}`,
              color: allCleared ? '#fff' : '#556677',
              fontSize: '13px', letterSpacing: '0.3em', fontWeight: '700',
              cursor: allCleared ? 'pointer' : 'not-allowed',
              fontFamily: 'inherit', borderRadius: '2px',
              boxShadow: allCleared ? '0 0 30px rgba(74, 124, 89, 0.4)' : 'none',
              animation: allCleared ? 'pulse 2s ease-in-out infinite' : 'none'
            }}
          >
            {allCleared ? '🌿 最終問題に挑む' : `🔒 全チェックポイント制覇で解放（${checkedIn.length}/${checkpoints.length}）`}
          </button>

          <style>{`
            @keyframes fadeSlide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
            @keyframes pulse { 0%,100% { box-shadow: 0 0 30px rgba(74, 124, 89, 0.4); } 50% { box-shadow: 0 0 50px rgba(74, 124, 89, 0.7); } }
            @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
          `}</style>
        </div>
      </Frame>
    );
  }

  // ====================================================================
  // ONSITE VISIT（場所選択型）
  // ====================================================================
  if (screen === 'onsite_visit' && currentCP) {
    // --- Step 1: 到着前の説明 ---
    if (onsiteStep === 'arrive') {
      return (
        <Frame>
          <div style={{
            minHeight: '680px',
            background: 'linear-gradient(180deg, #1a0a0a 0%, #2d1a1a 100%)',
            color: '#f0e6d2', padding: '20px 16px',
            fontFamily: '"Hiragino Sans", sans-serif'
          }}>
            <button onClick={() => setScreen('map')} style={backBtnStyle}>← マップへ</button>

            <div style={{
              textAlign: 'center', padding: '28px 20px',
              background: 'rgba(10, 5, 5, 0.6)',
              border: '1px solid rgba(196, 69, 54, 0.4)',
              borderRadius: '4px', marginBottom: '20px'
            }}>
              <div style={{
                fontSize: '10px', letterSpacing: '0.4em', color: '#e0685a',
                marginBottom: '10px', fontWeight: '700'
              }}>
                📍 ONSITE MISSION
              </div>
              <div style={{ fontSize: '44px', marginBottom: '8px' }}>🗺️</div>
              <div style={{
                fontSize: '18px', fontFamily: '"Hiragino Mincho ProN", serif',
                fontWeight: '600', marginBottom: '14px'
              }}>
                現地ミッション
              </div>

              <div style={{
                padding: '14px', background: 'rgba(196, 69, 54, 0.1)',
                border: '1px dashed rgba(196, 69, 54, 0.4)',
                fontSize: '12px', color: '#f0d4b0', lineHeight: '1.9',
                textAlign: 'left', borderRadius: '2px'
              }}>

                <span style={{ color: '#c9b037', fontWeight: '700' }}>②</span> その場所の <strong>看板・石碑</strong> の問題に答える<br />
                <span style={{ color: '#c9b037', fontWeight: '700' }}>③</span> クリアで現地PRと特典GET
              </div>
            </div>

              padding: '14px', background: 'rgba(74, 124, 89, 0.1)',

        <radialGradient id="caveWall" cx="50%" cy="50%" r="80%">
          <stop offset="0%" stopColor="#5a4a3a"/>
          <stop offset="100%" stopColor="#1a1008"/>
        </radialGradient>
      </defs>
      {/* 洞窟内部（暗い） */}
      <rect width="400" height="220" fill="url(#caveWall)"/>
      {/* 天井の岩（内側の輪郭） */}

      <ellipse cx="200" cy="60" rx="45" ry="12" fill="#c0e8f0" opacity="0.9"/>

      <ellipse cx="200" cy="60" rx="30" ry="6" fill="#fff" opacity="0.95"/>
      {/* 光芒（天窓から降り注ぐ） */}

      </g>
      {/* 海面 */}
      <rect x="0" y="165" width="400" height="55" fill="url(#caveWater)"/>
      {/* 海面のエメラルドハイライト（天窓の光が落ちる場所） */}
      <ellipse cx="200" cy="175" rx="90" ry="8" fill="#7ee8c8" opacity="0.7"/>
      <ellipse cx="200" cy="178" rx="70" ry="5" fill="#a8f0d8" opacity="0.8"/>
      {/* 波紋 */}
      <g stroke="#fff" strokeWidth="0.5" fill="none" opacity="0.5">
        <ellipse cx="200" cy="180" rx="50" ry="3"/>
        <ellipse cx="200" cy="185" rx="70" ry="4"/>
        <ellipse cx="200" cy="192" rx="100" ry="5"/>
        <path d="M 50 200 Q 80 198 110 200 T 170 200"/>
        <path d="M 230 200 Q 260 198 290 200 T 350 200"/>
      </g>
      {/* 遊覧船 */}
      <g>
        <ellipse cx="200" cy="195" rx="25" ry="4" fill="#3a2818"/>
        <rect x="180" y="188" width="40" height="8" fill="#8a6a4a" rx="1"/>
        <rect x="185" y="182" width="30" height="8" fill="#c9b088"/>
        <rect x="195" y="178" width="10" height="5" fill="#2a3a5a"/>
        {/* 船の人 */}
        <circle cx="192" cy="190" r="1" fill="#c44536"/>
        <circle cx="200" cy="190" r="1" fill="#c9b037"/>
        <circle cx="208" cy="190" r="1" fill="#4a7c3a"/>

      {/* しぶき */}
      <g fill="#fff" opacity="0.7">
        <circle cx="175" cy="198" r="1"/>
        <circle cx="225" cy="197" r="1"/>
        <circle cx="170" cy="202" r="0.8"/>
        <circle cx="230" cy="203" r="0.8"/>
      </g>
    </svg>
  );
}
function LocationScene({ type }) {
  if (type === 'bamboo') {
    // 修善寺・竹林の小径
    return (
      <svg viewBox="0 0 200 125" width="100%" height="100%">
        <rect width="200" height="125" fill="#3a5a3a"/>
        {/* 空 */}
        <rect x="0" y="0" width="200" height="50" fill="#6a8a6a" opacity="0.5"/>
        {/* 竹の幹たち */}
        {[15, 35, 55, 80, 110, 135, 160, 180].map((x, i) => (
          <g key={i}>
            <rect x={x} y="10" width={i % 2 ? 4 : 3} height="115" fill="#4a6a3a"/>
            <line x1={x-1} y1="35" x2={x + (i % 2 ? 5 : 4)} y2="35" stroke="#2d4520" strokeWidth="0.8"/>
            <line x1={x-1} y1="60" x2={x + (i % 2 ? 5 : 4)} y2="60" stroke="#2d4520" strokeWidth="0.8"/>
            <line x1={x-1} y1="85" x2={x + (i % 2 ? 5 : 4)} y2="85" stroke="#2d4520" strokeWidth="0.8"/>
          </g>
        ))}
        {/* 葉っぱ */}
        <g fill="#6a8a4a" opacity="0.7">
          <ellipse cx="20" cy="20" rx="6" ry="2" transform="rotate(30 20 20)"/>
          <ellipse cx="60" cy="15" rx="7" ry="2" transform="rotate(-20 60 15)"/>
          <ellipse cx="115" cy="18" rx="6" ry="2" transform="rotate(40 115 18)"/>
          <ellipse cx="165" cy="12" rx="7" ry="2" transform="rotate(-30 165 12)"/>
        </g>
        {/* 石畳 */}
        <rect x="0" y="105" width="200" height="20" fill="#7a7a6a"/>
        <g stroke="#5a5a4a" strokeWidth="0.5" fill="none" opacity="0.6">
          <line x1="0" y1="110" x2="200" y2="110"/>
          <line x1="0" y1="118" x2="200" y2="118"/>
          <line x1="30" y1="105" x2="30" y2="125"/>
          <line x1="70" y1="105" x2="70" y2="125"/>
          <line x1="110" y1="105" x2="110" y2="125"/>
          <line x1="150" y1="105" x2="150" y2="125"/>
        </g>
        {/* 光の漏れ */}
        <ellipse cx="100" cy="50" rx="30" ry="15" fill="#fff" opacity="0.15"/>
      </svg>
    );
  }

  if (type === 'mountain') {
    return (
      <svg viewBox="0 0 200 125" width="100%" height="100%">
        <rect width="200" height="125" fill="#a8c8d8"/>
        <rect x="0" y="0" width="200" height="70" fill="#b8d0d8"/>
        <circle cx="160" cy="25" r="10" fill="#fddd80" opacity="0.9"/>
        <path d="M 20 70 L 60 20 L 100 70 Z" fill="#7898b8"/>
        <path d="M 50 40 L 60 20 L 70 40 L 65 43 L 60 40 L 55 43 Z" fill="#fff"/>
        <path d="M 0 125 L 0 85 Q 40 65 100 62 Q 160 65 200 85 L 200 125 Z" fill="#4a6a3a"/>
        <ellipse cx="100" cy="64" rx="40" ry="5" fill="#5a7a4a"/>
        <ellipse cx="100" cy="66" rx="36" ry="3" fill="#6a8a5a"/>
        <g stroke="#2a4520" strokeWidth="0.4" fill="none" opacity="0.5">
          <path d="M 0 90 Q 50 72 100 70 Q 150 72 200 90"/>
          <path d="M 0 100 Q 50 82 100 80 Q 150 82 200 100"/>
        </g>
        <line x1="40" y1="108" x2="40" y2="120" stroke="#4a3a28" strokeWidth="1"/>
        <rect x="32" y="98" width="16" height="10" fill="#c9a867" stroke="#5a3a20" strokeWidth="0.5"/>
      </svg>
    );
  }

  if (type === 'bridge') {
    return (
      <svg viewBox="0 0 200 125" width="100%" height="100%">
        <rect width="200" height="60" fill="#7abbd8"/>
        <rect x="0" y="60" width="200" height="10" fill="#6a9ac8" opacity="0.5"/>
        <path d="M 120 60 L 165 15 L 200 60 Z" fill="#5a7898" opacity="0.85"/>
        <path d="M 155 30 L 165 15 L 175 30 L 170 33 L 165 30 L 160 33 Z" fill="#fff"/>
        <ellipse cx="30" cy="18" rx="15" ry="3" fill="#fff" opacity="0.9"/>
        <ellipse cx="95" cy="22" rx="18" ry="3" fill="#fff" opacity="0.8"/>
        <path d="M 0 62 L 30 45 L 60 55 L 100 42 L 130 52 L 140 45 L 150 60 L 0 60 Z" fill="#4a6a5a"/>
        <g fill="#3a5a3a">
          <circle cx="10" cy="75" r="9"/>
          <circle cx="30" cy="72" r="8"/>
          <circle cx="170" cy="74" r="9"/>
          <circle cx="190" cy="76" r="8"/>
        </g>
        <rect x="42" y="36" width="3" height="55" fill="#8a8a80"/>
        <rect x="155" y="36" width="3" height="55" fill="#8a8a80"/>
        <path d="M 44 38 Q 100 78 157 38" stroke="#5a5a50" strokeWidth="1.2" fill="none"/>
        <rect x="38" y="78" width="125" height="3" fill="#6a5a4a"/>
        <g stroke="#6a6a60" strokeWidth="0.4" fill="none" opacity="0.8">
          {[...Array(10)].map((_, i) => {
            const x = 48 + i * 11;
            const t = (x - 100) / 57;
            const arcY = 38 + (1 - t*t) * 38;
            return <line key={i} x1={x} y1={arcY} x2={x} y2="78"/>;
          })}
        </g>
        <rect x="0" y="95" width="200" height="30" fill="#3a5a3a"/>
        <g fill="#2a4520" opacity="0.7">
          <circle cx="20" cy="105" r="10"/>
          <circle cx="50" cy="108" r="8"/>
          <circle cx="90" cy="110" r="10"/>
          <circle cx="130" cy="108" r="9"/>
          <circle cx="170" cy="106" r="10"/>
        </g>
      </svg>
    );
  }

  if (type === 'cave') {
    return (
      <svg viewBox="0 0 200 125" width="100%" height="100%">
        <defs>
          <radialGradient id="caveBeam" cx="50%" cy="15%" r="50%">
            <stop offset="0%" stopColor="#c0e8f0" stopOpacity="0.8"/>
            <stop offset="100%" stopColor="#80c8d8" stopOpacity="0"/>
          </radialGradient>
        </defs>
        <rect width="200" height="125" fill="#2a1810"/>
        <path d="M 0 0 L 0 45 Q 50 55 100 60 Q 150 55 200 45 L 200 0 Z" fill="#1a0f08"/>
        <ellipse cx="100" cy="42" rx="22" ry="6" fill="#c0e8f0" opacity="0.9"/>
        <ellipse cx="100" cy="42" rx="18" ry="4" fill="#fff9c0" opacity="0.9"/>
        <ellipse cx="100" cy="42" rx="12" ry="2" fill="#fff"/>
        <ellipse cx="100" cy="85" rx="80" ry="45" fill="url(#caveBeam)"/>
        <path d="M 0 125 L 0 20 L 20 30 L 10 60 L 25 90 L 5 120 Z" fill="#3a2818"/>
        <path d="M 200 125 L 200 20 L 180 30 L 190 60 L 175 90 L 195 120 Z" fill="#3a2818"/>
        <rect x="0" y="90" width="200" height="35" fill="#3a8a9a"/>
        <ellipse cx="100" cy="98" rx="55" ry="5" fill="#7ee8c8" opacity="0.7"/>
        <ellipse cx="100" cy="100" rx="42" ry="3" fill="#a8f0d8" opacity="0.8"/>
        <g stroke="#fff" strokeWidth="0.3" fill="none" opacity="0.5">
          <ellipse cx="100" cy="105" rx="40" ry="2"/>
          <ellipse cx="100" cy="112" rx="60" ry="3"/>
        </g>
        <ellipse cx="100" cy="115" rx="13" ry="2" fill="#3a2818"/>
        <rect x="90" y="110" width="20" height="5" fill="#8a6a4a" rx="0.5"/>
        <rect x="93" y="106" width="14" height="5" fill="#c9b088"/>
      </svg>
    );
  }

  return null;
}

                        radial-gradient(2px 2px at 180px 100px, #fff, transparent),

                        radial-gradient(1px 1px at 300px 120px, #c9b037, transparent)`,
      backgroundSize: '350px 200px', opacity: 0.7
    }} />
  );
}

function Frame({ children }) {
  return (
    <div style={{
      minHeight: '100vh',
